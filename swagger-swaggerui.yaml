openapi: 3.0.3
info:
  title: Email Sending API (Swagger UI edition)
  description: |
    FastAPI-based email sending service deployed on Google Cloud Run.

    This is the **Swagger-UI-compatible** variant of the spec: it uses
    standard OpenAPI 3 `requestBody.examples` and a `bearerAuth` security
    scheme instead of the Redoc-only `x-codeSamples` vendor extension.
    Use this file when previewing in Swagger UI, the VS Code "Swagger
    Viewer" / "OpenAPI Editor" extensions, or any other Swagger-UI-based
    tool. For the Redoc edition with per-language code panels, see
    `swagger.yaml`.

    ## Cloud Run authentication

    When the service is deployed without `--allow-unauthenticated`,
    every request must carry a Google-signed OIDC ID token in
    `Authorization: Bearer <token>`, where the token's **audience**
    equals the Cloud Run service URL.

    **Try-it-out in Swagger UI:** click the **Authorize** button above
    and paste a freshly-minted OIDC token. Mint it with:

    ```bash
    gcloud auth print-identity-token --audiences=https://your-service-url
    ```

    Other options:

    - **Another GCP workload (GCE / GKE / Cloud Run / Cloud Build)** —
      the metadata server mints a token for the attached service account:
      ```bash
      curl -s -H "Metadata-Flavor: Google" \
        "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/identity?audience=https://your-service-url"
      ```
    - **Python** —
      `google.oauth2.id_token.fetch_id_token(Request(), SERVICE_URL)`
    - **Node** —
      `new GoogleAuth().getIdTokenClient(SERVICE_URL)` from `google-auth-library`
    - **Go** —
      `idtoken.NewClient(ctx, SERVICE_URL)` from
      `google.golang.org/api/idtoken`
  version: 2.1.0
  contact:
    name: API Support

servers:
  - url: https://{service-url}
    description: Cloud Run deployment
    variables:
      service-url:
        default: email-api-xxxxxx-uc.a.run.app
        description: Cloud Run service URL (without protocol)
  - url: http://localhost:8080
    description: Local development

# Applied globally — can be overridden per-operation with `security: []`
# if you want to exempt an endpoint from auth.
security:
  - bearerAuth: []

paths:
  /:
    get:
      summary: Root endpoint
      description: Quick service verification endpoint.
      operationId: root
      tags:
        - Health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
              examples:
                healthy:
                  summary: Healthy response
                  value:
                    status: healthy
                    service: Email Sending API
        "401":
          description: Missing or invalid OIDC token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: "Your client does not have permission to the requested URL"

  /health:
    get:
      summary: Health check
      description: Health check endpoint used by Cloud Run to verify the service is healthy.
      operationId: healthCheck
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              examples:
                healthy:
                  summary: Healthy response
                  value:
                    status: healthy
        "401":
          description: Missing or invalid OIDC token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: "Your client does not have permission to the requested URL"

  /send-email:
    post:
      summary: Send an email
      description: |
        Validates email addresses, checks against blocked/allowed domain
        lists in Firestore, and sends the email via SendGrid using a
        caller-supplied `subject`.

        **Processing steps:**
        1. Pydantic validates email format, `subject`, and required fields
        2. Recipient domains are checked against the blocked list
        3. Recipient domains are checked against the allowed list (if configured)
        4. Email is sent via SendGrid with the request-supplied subject
        5. Request is logged to BigQuery for audit

        **Domain policy:**
        - Blocked domains are checked first — any match returns 403
        - Allowed domains are checked second — if an allowlist exists and
          a domain is not on it, returns 403
        - An empty allowlist means all (non-blocked) domains are permitted
        - Subdomain matching is supported (e.g., `sub.blocked.com`
          matches `blocked.com`)

        **Authorization:** the caller's OIDC token (audience = service URL)
        is required in `Authorization: Bearer`. Click **Authorize** at the
        top of this page to attach it to the try-it-out form.

        **Audit header:** pass `X-Requestor-Email` to attribute the send
        to a human or system. Omitting it logs `"unknown"` to BigQuery.
      operationId: sendEmail
      tags:
        - Email
      parameters:
        - name: X-Requestor-Email
          in: header
          required: false
          description: Email address of the caller for audit logging. Defaults to `"unknown"`.
          schema:
            type: string
            format: email
            example: requestor@example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
            examples:
              basic:
                summary: Basic — single recipient
                description: Minimum required fields (`to_list`, `subject`, `mail_body`).
                value:
                  to_list:
                    - recipient@example.com
                  subject: "Hello from Cloud Run"
                  mail_body: "<p>Hello, this is a test email.</p>"
              with_cc:
                summary: With CC recipients
                description: Multi-recipient send with a CC list.
                value:
                  to_list:
                    - recipient1@example.com
                    - recipient2@example.com
                  cc_list:
                    - cc1@example.com
                    - cc2@example.com
                  subject: "Welcome"
                  mail_body: "<h1>Welcome</h1><p>This email has CC recipients.</p>"
              html_newsletter:
                summary: Rich-HTML newsletter body
                description: Demonstrates HTML body with structured content.
                value:
                  to_list:
                    - subscriber@example.com
                  subject: "April newsletter"
                  mail_body: |
                    <h1>This month at Example Corp</h1>
                    <p>Top stories:</p>
                    <ul>
                      <li>We shipped v2.1</li>
                      <li>New domain allowlist support</li>
                    </ul>
                    <p>— The team</p>
              batch_send:
                summary: Batch — near the 500-recipient cap
                description: |
                  `to_list` accepts up to 500 entries per request. Above
                  that, the Pydantic validator returns 422.
                value:
                  to_list:
                    - user1@example.com
                    - user2@example.com
                    - user3@example.com
                    - "... up to 500 entries"
                  subject: "Product update"
                  mail_body: "<p>Short-and-sweet broadcast.</p>"
              invalid_email_for_422:
                summary: Invalid email (illustrates a 422)
                description: |
                  This payload **will be rejected** with HTTP 422 by the
                  Pydantic validator because `not-an-email` is not a
                  valid address. Included so you can exercise the error
                  response.
                value:
                  to_list:
                    - not-an-email
                  subject: "Will fail validation"
                  mail_body: "<p>Nope.</p>"
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailSuccess"
              examples:
                sent:
                  summary: Delivered to SendGrid (202)
                  value:
                    status: success
                    message: Email sent successfully
                    status_code: 202
        "401":
          description: Missing or invalid OIDC token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: "Your client does not have permission to the requested URL"
        "403":
          description: Forbidden — recipient domain is blocked or not in the allowed list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                blocked:
                  summary: Blocked domain
                  value:
                    detail: "Email address 'user@blocked.com' belongs to a blocked domain"
                not_allowed:
                  summary: Domain not in allowlist
                  value:
                    detail: "Email address 'user@unknown.com' does not belong to an allowed domain"
        "422":
          description: Unprocessable Entity — validation error or missing configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                invalid_email:
                  summary: Invalid email format
                  value:
                    detail:
                      - loc:
                          - body
                          - to_list
                          - 0
                        msg: "Value error, Invalid email address: not-an-email"
                        type: value_error
                empty_subject:
                  summary: Empty subject
                  value:
                    detail:
                      - loc:
                          - body
                          - subject
                        msg: "Value error, subject cannot be empty"
                        type: value_error
                empty_body:
                  summary: Empty mail body
                  value:
                    detail:
                      - loc:
                          - body
                          - mail_body
                        msg: "Value error, mail_body cannot be empty"
                        type: value_error
                missing_config:
                  summary: Missing configuration (e.g., SENDER_EMAIL)
                  value:
                    detail: "SENDER_EMAIL environment variable not set"
        "502":
          description: Bad Gateway — upstream service failure (SendGrid or Secret Manager)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: "SendGrid API failed with status 400: Bad Request"
        "500":
          description: Internal Server Error — unexpected failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: An unexpected error occurred while sending the email

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Google-signed OIDC ID token for Cloud Run authentication. The
        token's **audience** claim must equal the Cloud Run service URL.

        Mint one with:
        ```bash
        gcloud auth print-identity-token --audiences=https://your-service-url
        ```

  schemas:
    EmailRequest:
      type: object
      required:
        - to_list
        - subject
        - mail_body
      properties:
        to_list:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 500
          description: List of recipient email addresses (TO). Maximum 500.
          example:
            - recipient@example.com
        cc_list:
          type: array
          items:
            type: string
            format: email
          maxItems: 500
          nullable: true
          description: Optional list of CC recipient email addresses. Maximum 500. Defaults to null.
          example:
            - cc@example.com
        subject:
          type: string
          minLength: 1
          description: Email subject line. Cannot be empty or whitespace-only.
          example: "Hello from Cloud Run"
        mail_body:
          type: string
          minLength: 1
          description: HTML body of the email. Cannot be empty or whitespace-only.
          example: "<p>Hello, this is a test email.</p>"

    SendEmailSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Email sent successfully
        status_code:
          type: integer
          example: 202

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message

    ValidationErrorResponse:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
                description: Location of the error (e.g., ["body", "to_list"])
              msg:
                type: string
                description: Error message
              type:
                type: string
                description: Error type identifier

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy

    RootResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        service:
          type: string
          example: Email Sending API

tags:
  - name: Health
    description: Service health and readiness endpoints
  - name: Email
    description: Email sending operations
