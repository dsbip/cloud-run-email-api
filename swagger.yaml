openapi: 3.0.3
info:
  title: Email Sending API
  description: |
    FastAPI-based email sending service deployed on Google Cloud Run.

    Features:
    - Email validation with regex
    - Domain blocking and allowlisting via Firestore
    - Email delivery via SendGrid with per-request subject
    - BigQuery audit logging for every request
    - Requestor identity tracking via `X-Requestor-Email` header

    **Code samples**: Each endpoint below includes ready-to-run `x-codeSamples`
    for `curl`, `python` (requests) and `javascript` (fetch). In Redoc / Swagger
    UI variants that honour the `x-codeSamples` vendor extension, these appear
    as a copy-paste code panel next to the endpoint.
  version: 2.1.0
  contact:
    name: API Support

servers:
  - url: https://{service-url}
    description: Cloud Run deployment
    variables:
      service-url:
        default: email-api-xxxxxx-uc.a.run.app
        description: Cloud Run service URL (without protocol)
  - url: http://localhost:8080
    description: Local development

paths:
  /:
    get:
      summary: Root endpoint
      description: Quick service verification endpoint.
      operationId: root
      tags:
        - Health
      responses:
        "200":
          description: Service is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootResponse"
              example:
                status: healthy
                service: Email Sending API
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X GET "https://your-service-url/"
        - lang: python
          label: Python (requests)
          source: |
            import requests
            r = requests.get("https://your-service-url/")
            print(r.status_code, r.json())
        - lang: javascript
          label: JavaScript (fetch)
          source: |
            const res = await fetch("https://your-service-url/");
            console.log(res.status, await res.json());

  /health:
    get:
      summary: Health check
      description: Health check endpoint used by Cloud Run to verify the service is healthy.
      operationId: healthCheck
      tags:
        - Health
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: healthy
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X GET "https://your-service-url/health"
        - lang: python
          label: Python (requests)
          source: |
            import requests
            r = requests.get("https://your-service-url/health")
            r.raise_for_status()
            print(r.json())
        - lang: javascript
          label: JavaScript (fetch)
          source: |
            const res = await fetch("https://your-service-url/health");
            console.log(await res.json());

  /send-email:
    post:
      summary: Send an email
      description: |
        Validates email addresses, checks against blocked/allowed domain lists
        in Firestore, and sends the email via SendGrid using a caller-supplied
        `subject`.

        **Processing steps:**
        1. Pydantic validates email format, `subject`, and required fields
        2. All recipient domains are checked against the blocked domains list
        3. All recipient domains are checked against the allowed domains list (if configured)
        4. Email is sent via SendGrid with the request-supplied subject
        5. Request is logged to BigQuery for audit

        **Domain policy:**
        - Blocked domains are checked first — any match returns 403
        - Allowed domains are checked second — if an allowlist exists and a domain is not on it, returns 403
        - An empty allowlist means all (non-blocked) domains are permitted
        - Subdomain matching is supported (e.g., `sub.blocked.com` matches `blocked.com`)
      operationId: sendEmail
      tags:
        - Email
      parameters:
        - name: X-Requestor-Email
          in: header
          required: false
          description: Email address of the person or system making the request. Used for audit logging. Defaults to `"unknown"` if not provided.
          schema:
            type: string
            format: email
            example: requestor@example.com
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
            examples:
              basic:
                summary: Basic email
                value:
                  to_list:
                    - recipient@example.com
                  subject: "Hello from Cloud Run"
                  mail_body: "<p>Hello, this is a test email.</p>"
              with_cc:
                summary: Email with CC recipients
                value:
                  to_list:
                    - recipient1@example.com
                    - recipient2@example.com
                  cc_list:
                    - cc1@example.com
                    - cc2@example.com
                  subject: "Welcome"
                  mail_body: "<h1>Welcome</h1><p>This email has CC recipients.</p>"
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailSuccess"
              example:
                status: success
                message: Email sent successfully
                status_code: 202
        "403":
          description: Forbidden — recipient domain is blocked or not in the allowed list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                blocked:
                  summary: Blocked domain
                  value:
                    detail: "Email address 'user@blocked.com' belongs to a blocked domain"
                not_allowed:
                  summary: Domain not in allowlist
                  value:
                    detail: "Email address 'user@unknown.com' does not belong to an allowed domain"
        "422":
          description: Unprocessable Entity — validation error or missing configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
              examples:
                invalid_email:
                  summary: Invalid email format
                  value:
                    detail:
                      - loc:
                          - body
                          - to_list
                          - 0
                        msg: "Value error, Invalid email address: not-an-email"
                        type: value_error
                empty_subject:
                  summary: Empty subject
                  value:
                    detail:
                      - loc:
                          - body
                          - subject
                        msg: "Value error, subject cannot be empty"
                        type: value_error
                empty_body:
                  summary: Empty mail body
                  value:
                    detail:
                      - loc:
                          - body
                          - mail_body
                        msg: "Value error, mail_body cannot be empty"
                        type: value_error
                missing_config:
                  summary: Missing configuration (e.g., SENDER_EMAIL)
                  value:
                    detail: "SENDER_EMAIL environment variable not set"
        "502":
          description: Bad Gateway — upstream service failure (SendGrid or Secret Manager)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: "SendGrid API failed with status 400: Bad Request"
        "500":
          description: Internal Server Error — unexpected failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                detail: An unexpected error occurred while sending the email
      x-codeSamples:
        - lang: curl
          label: cURL
          source: |
            curl -X POST "https://your-service-url/send-email" \
              -H "Content-Type: application/json" \
              -H "X-Requestor-Email: requestor@example.com" \
              -d '{
                "to_list": ["recipient@example.com"],
                "cc_list": ["cc@example.com"],
                "subject": "Hello from Cloud Run",
                "mail_body": "<p>Hello from the Email API.</p>"
              }'
        - lang: python
          label: Python (requests)
          source: |
            import requests

            url = "https://your-service-url/send-email"
            headers = {
                "Content-Type": "application/json",
                "X-Requestor-Email": "requestor@example.com",
            }
            payload = {
                "to_list": ["recipient@example.com"],
                "cc_list": ["cc@example.com"],
                "subject": "Hello from Cloud Run",
                "mail_body": "<p>Hello from the Email API.</p>",
            }

            resp = requests.post(url, json=payload, headers=headers, timeout=30)
            resp.raise_for_status()
            print(resp.json())
        - lang: javascript
          label: JavaScript (fetch)
          source: |
            const res = await fetch("https://your-service-url/send-email", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "X-Requestor-Email": "requestor@example.com",
              },
              body: JSON.stringify({
                to_list: ["recipient@example.com"],
                cc_list: ["cc@example.com"],
                subject: "Hello from Cloud Run",
                mail_body: "<p>Hello from the Email API.</p>",
              }),
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}: ${await res.text()}`);
            console.log(await res.json());
        - lang: node
          label: Node.js (axios)
          source: |
            const axios = require("axios");

            (async () => {
              const { data } = await axios.post(
                "https://your-service-url/send-email",
                {
                  to_list: ["recipient@example.com"],
                  cc_list: ["cc@example.com"],
                  subject: "Hello from Cloud Run",
                  mail_body: "<p>Hello from the Email API.</p>",
                },
                {
                  headers: {
                    "Content-Type": "application/json",
                    "X-Requestor-Email": "requestor@example.com",
                  },
                  timeout: 30000,
                }
              );
              console.log(data);
            })();
        - lang: go
          label: Go (net/http)
          source: |
            package main

            import (
              "bytes"
              "encoding/json"
              "fmt"
              "io"
              "net/http"
            )

            func main() {
              body, _ := json.Marshal(map[string]any{
                "to_list":   []string{"recipient@example.com"},
                "cc_list":   []string{"cc@example.com"},
                "subject":   "Hello from Cloud Run",
                "mail_body": "<p>Hello from the Email API.</p>",
              })
              req, _ := http.NewRequest("POST",
                "https://your-service-url/send-email",
                bytes.NewBuffer(body))
              req.Header.Set("Content-Type", "application/json")
              req.Header.Set("X-Requestor-Email", "requestor@example.com")

              resp, err := http.DefaultClient.Do(req)
              if err != nil { panic(err) }
              defer resp.Body.Close()
              out, _ := io.ReadAll(resp.Body)
              fmt.Println(resp.StatusCode, string(out))
            }

components:
  schemas:
    EmailRequest:
      type: object
      required:
        - to_list
        - subject
        - mail_body
      properties:
        to_list:
          type: array
          items:
            type: string
            format: email
          minItems: 1
          maxItems: 500
          description: List of recipient email addresses (TO). Maximum 500.
          example:
            - recipient@example.com
        cc_list:
          type: array
          items:
            type: string
            format: email
          maxItems: 500
          nullable: true
          description: Optional list of CC recipient email addresses. Maximum 500. Defaults to null.
          example:
            - cc@example.com
        subject:
          type: string
          minLength: 1
          description: Email subject line. Cannot be empty or whitespace-only.
          example: "Hello from Cloud Run"
        mail_body:
          type: string
          minLength: 1
          description: HTML body of the email. Cannot be empty or whitespace-only.
          example: "<p>Hello, this is a test email.</p>"

    SendEmailSuccess:
      type: object
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: Email sent successfully
        status_code:
          type: integer
          example: 202

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          description: Human-readable error message

    ValidationErrorResponse:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
                description: Location of the error (e.g., ["body", "to_list"])
              msg:
                type: string
                description: Error message
              type:
                type: string
                description: Error type identifier

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy

    RootResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        service:
          type: string
          example: Email Sending API

tags:
  - name: Health
    description: Service health and readiness endpoints
  - name: Email
    description: Email sending operations
