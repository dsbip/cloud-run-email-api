    <!--
      Self-contained Redoc viewer for this repo's swagger.yaml.

      Redoc is open source (MIT, https://github.com/Redocly/redoc) and

      extension. This page is the only thing you need to preview the
      API locally — no VS Code extension, no Redocly SaaS, no account.

      Two ways to view:

        1. One-liner, any OS with Python installed:
             python -m http.server 8000
           then open http://localhost:8000/docs.html

        2. With Node.js installed, no setup:
             npx @redocly/cli preview-docs swagger.yaml

      If you want to run fully offline (no CDN), download the bundle
      once and point the <script src> at the local file:

        curl -L -o redoc.standalone.js \
          https://cdn.jsdelivr.net/npm/redoc@2/bundles/redoc.standalone.js

      Then change the <script src> below from the jsdelivr URL to
      "./redoc.standalone.js".
    -->

    </style>
